name: 5-Sigma Architectural Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  thermodynamic_build_audit:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ingest the Blueprint
      uses: actions/checkout@v4

    - name: 2. Enforce 3.11 Gravitational Constant
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 3. Forge the Mathematical Engines
      run: |
        python -m pip install --upgrade pip
        # This mirrors the Hugging Face and Local installation exactly
        pip install -e .

    - name: 4. Execute Logic Compilation Audit
      run: |
        echo "Verifying Core Math Engines..."
        python -c "import scanpy, celltypist, anndata, pynndescent, umap; print('Core Engines: STABLE')"
        
        echo "Verifying Internal Pipeline Architecture..."
        python -c "import pbmc3k_pipeline.P03_qc_filtering; print('P03 QC Logic: STABLE')"
        python -c "import pbmc3k_pipeline.P04_clustering; print('P04 Topology Logic: STABLE')"
        python -c "import pbmc3k_pipeline.P05_top_markers; print('P05 Marker Logic: STABLE')"
        python -c "import pbmc3k_pipeline.P06_annotation; print('P06 Annotation Logic: STABLE')"